*{
margin:0;
padding:0;
box-sizing:border-box;

/* الخلفية السوداء */
body{
background:#000;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* طبقة النجوم */
.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 200s linear infinite;
z-index:-2;
}

/* اللمعات */
.twinkling{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(white 1px, transparent 1px);
background-size:80px 80px;
opacity:0.15;
animation:twinkle 6s ease-in-out infinite alternate;
z-index:-1;
}

/* حركة النجوم */
@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* حركة اللمعان */
@keyframes twinkle{
from{opacity:0.05;}
to{opacity:0.25;}
}

/* المحتوى */
.container{
text-align:center;
}

h1{
font-size:60px;
letter-spacing:5px;
margin-bottom:30px;
}

/* الأزرار */
.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

button{
background:transparent;
border:1px solid white;
color:white;
padding:15px 30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
color:black;
}

</style>
