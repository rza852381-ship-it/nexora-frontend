<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>NEXORA&RB</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#fff;
font-family:'Tajawal',sans-serif;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* العنوان */

h1{
font-size:70px;
letter-spacing:4px;
margin-bottom:60px;
}

/* الأزرار */

.buttons{
display:flex;
gap:20px;
}

.btn{
border:1px solid #fff;
padding:15px 40px;
text-decoration:none;
color:#fff;
transition:0.3s;
}

.btn:hover{
background:#fff;
color:#000;
}

/* كرة coming soon */

.sphere{
position:absolute;
top:80px;
right:120px;
width:160px;
height:160px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
animation:spin 8s linear infinite;
border:1px solid #fff;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="sphere">
COMING SOON
</div>

<h1>NEXORA&RB</h1>

<div class="buttons">

<a class="btn" href="#">انشاء حساب</a>

<a class="btn" href="#">→ تسجيل دخول</a>

<a class="btn" href="#">→ منصة تسويقية بالذكاء الاصطناعي</a>

</div>

</body>
</html>
