<!DOCTYPE html><h2>إضافة منتج</h2>

<input id="productName" placeholder="اسم المنتج">

<input id="productPrice" placeholder="السعر">

<input id="productImage" placeholder="رابط الصورة">

<button onclick="addProduct()">إضافة</button>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Nexora Dashboard</title>

<style>
<script>async function addProduct(){

const name = document.querySelector("#productName").value
const price = document.querySelector("#productPrice").value
const image = document.querySelector("#productImage").value

const res = await fetch("/add-product",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name,price,image})

})

const data = await res.json()

if(data.success){

alert("تم إضافة المنتج")

}

  }

if(!localStorage.getItem("user")){

window.location="index.html"

}

</script>
body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
text-align:center;
}

h1{
color:#6a4df4;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:500px;
margin:auto;
}

</style>

</head>

<body>

<div class="card">

<h1>مرحباً بك في Nexora 🚀</h1>

<p>
هذه لوحة التحكم الخاصة بمتجرك
</p>

<button onclick="logout()">تسجيل الخروج</button>

</div>

<script>

function logout(){

localStorage.removeItem("user")

window.location="index.html"

}

</script>

</body>

</html>
