</div><div class="container"><div class="card"><h3>إنشاء حملة تسويقية</h3><button onclick="createCampaign()">إنشاء حملة</button>

let freeCampaigns = 2
let createdCampaigns = 0

function createCampaign(){

if(createdCampaigns >= freeCampaigns){

alert("انتهت الحملات المجانية، يرجى الاشتراك")

return

}

createdCampaigns++

document.getElementById("campaignCount").innerText =
"عدد الحملات المستخدمة: " + createdCampaigns + " / 2"

alert("تم إنشاء حملة بنجاح")

}

function createVideo(){

alert("سيتم إنشاء فيديو إعلان AI قريباً")

}

function createImage(){

}
